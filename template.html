<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face { font-family: 'LEIXO'; src: url('fonts/LEIXO.ttf') format('truetype'); }
        @font-face { font-family: 'NeueMachina-Bold'; src: url('fonts/NeueMachina-Bold.otf') format('opentype'); }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header, .media-container, .bottom-interface {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .main-header { padding-top: 60px; }

        .logo { margin: 0; width: 100%; }
        
        .logo a {
            font-family: 'LEIXO', sans-serif;
            font-size: clamp(24px, 8.5vw, 54px);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            width: 100%;
            white-space: nowrap;
            color: inherit;
            text-decoration: none;
        }

        .logo span.space { width: 0.3em; }

        .media-container {
            margin: 40px auto 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            min-height: 300px;
        }

        .media-container video, .media-container img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }

        /* DYNAMIC INTERFACE BOX */
        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Default 2x2 */
            gap: 12px;
            margin: 40px auto 80px;
        }

        /* CLASS TO SWITCH TO 3-BUTTON LAYOUT */
        .bottom-interface.three-buttons {
            display: flex;
            justify-content: space-between;
        }

        .bottom-interface.three-buttons .control-btn {
            flex: 1;
            aspect-ratio: auto;
            height: 50px;
        }

        .control-btn {
            aspect-ratio: 3 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid white;
            background: transparent;
            color: white;
            transition: all 0.2s ease;
        }

        .control-btn:hover { background-color: white; color: black; }
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .main-header, .bottom-interface, .media-container { padding: 0 15px; }
            .bottom-interface.three-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">
            <a href="index.html">
                <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span>
                <span class="space"></span>
                <span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
            </a>
        </h1>
    </header>

    <main>
        <div class="media-container">
            <video id="letterVideo" class="hidden" autoplay muted playsinline loop>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <img id="letterCard" class="hidden" src="" alt="Strategy Card">
        </div>

        <div id="controls" class="bottom-interface">
            <button id="btn-1" class="control-btn"></button>
            <button id="btn-2" class="control-btn"></button>
            <button id="btn-3" class="control-btn"></button>
            <button id="btn-4" class="control-btn"></button>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const letter = urlParams.get('letter') || 'a';
        const mode = urlParams.get('mode') || 'video';

        const controls = document.getElementById('controls');
        const btn1 = document.getElementById('btn-1');
        const btn2 = document.getElementById('btn-2');
        const btn3 = document.getElementById('btn-3');
        const btn4 = document.getElementById('btn-4');

        const video = document.getElementById('letterVideo');
        const img = document.getElementById('letterCard');

        function getRandomLetter() {
            const letters = "abcdefghijklmnopqrstuvwxyz";
            return letters[Math.floor(Math.random() * letters.length)];
        }

        function init() {
            if (letter === 'intro') {
                video.classList.remove('hidden');
                document.getElementById('videoSource').src = 'assets/videos/intro.mp4';
                video.load();
                setupIntroButtons();
            } else {
                if (mode === 'video') {
                    video.classList.remove('hidden');
                    img.classList.add('hidden');
                    document.getElementById('videoSource').src = `assets/videos/${letter}.mp4`;
                    video.load();
                    controls.classList.remove('three-buttons');
                } else {
                    img.classList.remove('hidden');
                    video.classList.add('hidden');
                    img.src = `assets/cards/${letter}.png`;
                    controls.classList.add('three-buttons');
                }
                setupStandardButtons();
            }
        }

        function setupIntroButtons() {
            btn1.innerText = "SOUND ON";
            btn1.onclick = () => {
                video.muted = !video.muted;
                btn1.innerText = video.muted ? "SOUND ON" : "SOUND OFF";
            };
            btn2.innerText = "PICK A RANDOM CARD";
            btn2.onclick = () => { window.location.href = `template.html?letter=${getRandomLetter()}&mode=card`; };
            btn3.innerText = "PICK A RANDOM VIDEO";
            btn3.onclick = () => { window.location.href = `template.html?letter=${getRandomLetter()}&mode=video`; };
            btn4.innerText = "BACK TO ALPHABET";
            btn4.onclick = () => { window.location.href = "index.html"; };
        }

        function setupStandardButtons() {
            if (mode === 'video') {
                btn1.classList.remove('hidden');
                btn1.innerText = video.muted ? "SOUND ON" : "SOUND OFF";
                btn1.onclick = () => { 
                    video.muted = !video.muted; 
                    btn1.innerText = video.muted ? "SOUND ON" : "SOUND OFF"; 
                };
                
                btn2.innerText = "ANOTHER RANDOM VIDEO";
                btn2.onclick = () => { window.location.href = `template.html?letter=${getRandomLetter()}&mode=video`; };

                btn3.innerText = "VIEW CARD VERSION";
                btn3.onclick = () => { window.location.href = `template.html?letter=${letter}&mode=card`; };

                btn4.innerText = "BACK TO ALPHABET";
                btn4.onclick = () => { window.location.href = "index.html"; };
            } else {
                // CARD MODE - 3 BUTTONS
                btn1.classList.add('hidden');
                
                btn2.innerText = "ANOTHER RANDOM CARD";
                btn2.onclick = () => { window.location.href = `template.html?letter=${getRandomLetter()}&mode=card`; };

                btn3.innerText = "VIEW VIDEO VERSION";
                btn3.onclick = () => { window.location.href = `template.html?letter=${letter}&mode=video`; };

                btn4.innerText = "BACK TO ALPHABET";
                btn4.onclick = () => { window.location.href = "index.html"; };
            }
        }

        window.onload = init;
    </script>
</body>
</html>
