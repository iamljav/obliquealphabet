<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FONT PATH UPDATED TO NEUE MACHINA */
        @font-face {
            font-family: 'NeueMachina';
            src: url('fonts/NeueMachina-Regular.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            font-family: 'NeueMachina', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .media-container {
            width: 100%;
            max-width: 400px;
            margin: 40px auto 0;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* Managed by script.js for smooth fade */
            transition: opacity 0.5s ease-in-out;
        }

        .media-container video, 
        .media-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 15px;
            row-gap: 20px;
            width: 100%;
            max-width: 450px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .control-btn {
            aspect-ratio: 2 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid white;
            background: transparent;
            color: white;
            font-family: 'NeueMachina', sans-serif;
            line-height: 1.2;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .control-btn:hover {
            background-color: white;
            color: black;
        }

        .hidden { display: none !important; }

        .about-nav {
            margin-top: 20px;
            padding-bottom: 60px;
        }

        .back-link {
            color: white;
            text-decoration: underline;
            font-size: 13px;
            opacity: 0.6;
            font-family: 'NeueMachina', sans-serif;
        }

        @media (max-width: 450px) {
            .control-btn { font-size: 9px; }
            .media-container { min-height: 300px; }
        }
    </style>
</head>
<body class="letter-page">

    <header class="main-header" style="padding-top: 60px;">
        <h1 class="logo" style="font-size: 42px; text-transform: uppercase; letter-spacing: 2px;">OBLIQUE ALPHABET</h1>
    </header>

    <main class="center-content">
        <div class="media-container">
            <video id="letterVideo" class="hidden" autoplay muted playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <img id="letterCard" class="hidden" src="" alt="Oblique Strategy Card">
        </div>

        <div class="bottom-interface">
            <button id="soundToggle" class="control-btn" onclick="toggleSound()">SOUND ON</button>
            <button class="control-btn" onclick="getRandom('video')">ANOTHER RANDOM VIDEO</button>
            <button id="replayBtn" class="control-btn" onclick="replayVideo()">REPLAY</button>
            <button class="control-btn" onclick="getRandom('card')">PICK A RANDOM CARD</button>
        </div>
        
        <footer class="about-nav">
            <a href="index.html" class="back-link">BACK TO THE ALPHABET</a>
        </footer>
    </main>

    <script src="script.js"></script>

    <script>
        // Adjust button labels if we are in Card Mode
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mode = params.get('mode') || 'video';
            if (mode === 'card') {
                const soundBtn = document.getElementById('soundToggle');
                const replayBtn = document.getElementById('replayBtn');
                
                soundBtn.innerText = "---";
                soundBtn.style.opacity = "0.3";
                soundBtn.disabled = true;

                replayBtn.innerText = "BACK TO START";
                replayBtn.onclick = () => window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
