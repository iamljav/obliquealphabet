<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face {
            font-family: 'LEIXO';
            src: url('fonts/LEIXO.ttf') format('truetype');
        }
        @font-face {
            font-family: 'NeueMachina-Bold';
            src: url('fonts/NeueMachina-Bold.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header { padding: 60px 20px 0; }
        .logo { font-family: 'LEIXO', sans-serif; font-size: 42px; text-transform: uppercase; letter-spacing: 2px; }

        .media-container {
            width: 100%;
            max-width: 400px;
            margin: 40px auto 0;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .media-container video, .media-container img { width: 100%; height: auto; }

        /* THE 2x2 GRID */
        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 15px;
            row-gap: 15px;
            width: 100%;
            max-width: 500px; /* Slightly wider for the longer text */
            margin: 40px auto;
            padding: 0 20px;
        }

        .control-btn {
            aspect-ratio: 2.2 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid white;
            background: transparent;
            color: white;
            line-height: 1.2;
            transition: all 0.2s ease;
        }

        .control-btn:hover { background-color: white; color: black; }
        .hidden { display: none !important; }

        @media (max-width: 450px) {
            .control-btn { font-size: 8.5px; }
            .media-container { min-height: 300px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">OBLIQUE ALPHABET</h1>
    </header>

    <main>
        <div class="media-container">
            <video id="letterVideo" class="hidden" autoplay muted playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <img id="letterCard" class="hidden" src="" alt="Strategy Card">
        </div>

        <div class="bottom-interface">
            <button id="btn-1" class="control-btn"></button>
            <button id="btn-2" class="control-btn"></button>
            <button id="btn-3" class="control-btn"></button>
            <button id="btn-4" class="control-btn"></button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
