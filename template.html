<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face {
            font-family: 'LEIXO';
            src: url('fonts/LEIXO.ttf') format('truetype');
        }
        @font-face {
            font-family: 'NeueMachina-Bold';
            src: url('fonts/NeueMachina-Bold.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header, .media-container, .bottom-interface {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .main-header { padding-top: 60px; }

        .logo {
            font-family: 'LEIXO', sans-serif;
            font-size: clamp(24px, 8.5vw, 54px);
            text-transform: uppercase;
            margin: 0;
            display: flex;
            justify-content: space-between;
            width: 100%;
            white-space: nowrap;
        }

        .logo span.space { width: 0.3em; }

        /* FIXED MEDIA CONTAINER */
        .media-container {
            margin: 40px auto 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
        }

        .media-container video, .media-container img {
            width: 100%;
            height: auto;
            max-height: 70vh; /* Ensures it doesn't push buttons off screen */
            object-fit: contain; /* Ensures full video is visible */
            display: block;
        }

        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 40px auto 80px;
        }

        .control-btn {
            aspect-ratio: 3 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1px solid white;
            background: transparent;
            color: white;
        }

        .control-btn:hover {
            background-color: white;
            color: black;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .main-header, .bottom-interface, .media-container { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">
            <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span>
            <span class="space"></span>
            <span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
        </h1>
    </header>

    <main>
        <div class="media-container">
            <video id="letterVideo" class="hidden" autoplay muted playsinline loop>
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <img id="letterCard" class="hidden" src="" alt="Strategy Card">
        </div>

        <div class="bottom-interface">
            <button id="btn-1" class="control-btn"></button>
            <button id="btn-2" class="control-btn"></button>
            <button id="btn-3" class="control-btn"></button>
            <button id="btn-4" class="control-btn"></button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
