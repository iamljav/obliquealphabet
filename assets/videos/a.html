<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEO A | OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        /* 2x2 Grid with Reduced Height and Increased Vertical Spacing */
        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            column-gap: 15px;               /* Horizontal space between buttons */
            row-gap: 30px;                  /* Increased vertical space between rows */
            width: 100%;
            max-width: 450px;               /* Adjusted width for the grid container */
            margin: 40px auto;              /* More breathing room below the video */
        }

        .control-btn {
            /* aspect-ratio of 2/1 makes the button twice as wide as it is tall */
            aspect-ratio: 2 / 1;            
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            line-height: 1.2;
            /* Inherits your border and background from style.css */
        }

        /* Adjusts button text for smaller screens */
        @media (max-width: 450px) {
            .bottom-interface {
                max-width: 90%;
            }
            .control-btn {
                font-size: 9px;
            }
        }
    </style>
</head>
<body class="letter-page">

    <header class="main-header">
        <div class="title-block">
            <h1 class="logo">
                <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span>&nbsp;<span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
            </h1>
            <p class="subtitle">an alphabet of control and creation</p>
        </div>
    </header>

    <main class="center-content">
        <div class="video-container">
            
            <video id="letterVideo" autoplay muted playsinline>
                <source src="a.mp4" type="video/mp4">
            </video>

            <div class="bottom-interface">
                <button id="soundToggle" class="control-btn" onclick="toggleSound()">SOUND ON</button>
                <button class="control-btn" onclick="randomVideo()">ANOTHER RANDOM VIDEO</button>
                
                <button class="control-btn" onclick="replayVideo()">REPLAY THE VIDEO</button>
                <button class="control-btn" onclick="randomCard()">PICK A RANDOM CARD</button>
            </div>
            
        </div>
        
        <footer class="about-nav">
            <a href="../../index.html" class="back-link">BACK TO THE ALPHABET</a>
        </footer>
    </main>

    <script src="../../script.js"></script>
    <script>
        // Temporary logic for the new button
        function randomCard() {
            console.log("Random Card triggered");
            // Add your navigation or card-flipping logic here later
        }
    </script>
</body>
</html>
