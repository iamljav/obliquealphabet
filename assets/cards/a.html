<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD A | OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        /* Consistent Grid with the Video Page */
        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            column-gap: 15px;               /* Horizontal space between buttons */
            width: 100%;
            max-width: 450px;               
            margin: 40px auto;              
        }

        .control-btn {
            /* 2/1 aspect ratio matches the video page buttons */
            aspect-ratio: 2 / 1;            
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            line-height: 1.2;
            /* Border and background styles inherited from style.css */
        }

        /* Responsive scaling */
        @media (max-width: 450px) {
            .bottom-interface {
                max-width: 90%;
            }
            .control-btn {
                font-size: 9px;
            }
        }
    </style>
</head>
<body class="card-page">
    <header class="main-header">
        <div class="title-block">
            <h1 class="logo">
                <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span>&nbsp;<span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
            </h1>
            <p class="subtitle">an alphabet of control and creation</p>
        </div>
    </header>

    <main class="center-content">
        <div class="video-container card-frame">
            <img src="a.png" alt="Oblique Strategy Card A">

            <div class="bottom-interface">
                <button class="control-btn" onclick="randomCard()">ANOTHER RANDOM CARD</button>
                
                <button class="control-btn" onclick="randomVideo()">PICK A RANDOM VIDEO</button>
            </div>
        </div>
        
        <footer class="about-nav">
            <a href="../../index.html" class="back-link">BACK TO THE ALPHABET</a>
        </footer>
    </main>

    <script src="../../script.js"></script>
</body>
</html>
