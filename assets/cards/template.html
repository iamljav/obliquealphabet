<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Using the 2x2 grid we designed earlier */
        .bottom-interface {
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 15px;
            row-gap: 30px;
            width: 100%;
            max-width: 450px;
            margin: 40px auto;
        }
        .control-btn {
            aspect-ratio: 2 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body class="letter-page">
    <header class="main-header">
        <div class="title-block">
            <h1 class="logo">OBLIQUE ALPHABET</h1>
            <p class="subtitle">an alphabet of control and creation</p>
        </div>
    </header>

    <main class="center-content">
        <div class="video-container">
            <video id="letterVideo" autoplay muted playsinline>
                <source id="videoSource" src="" type="video/mp4">
            </video>

            <div class="bottom-interface">
                <button id="soundToggle" class="control-btn" onclick="toggleSound()">SOUND ON</button>
                <button class="control-btn" onclick="getRandom('video')">ANOTHER RANDOM VIDEO</button>
                <button class="control-btn" onclick="replayVideo()">REPLAY THE VIDEO</button>
                <button class="control-btn" onclick="getRandom('card')">PICK A RANDOM CARD</button>
            </div>
        </div>
        
        <footer class="about-nav">
            <a href="index.html" class="back-link">BACK TO THE ALPHABET</a>
        </footer>
    </main>

    <script src="script.js"></script>
    <script>
        // 1. Get the letter from the URL
        const params = new URLSearchParams(window.location.search);
        const currentLetter = params.get('letter') || 'a';

        // 2. Update the Video and Page Title
        const video = document.getElementById('letterVideo');
        const source = document.getElementById('videoSource');
        
        // Assuming your videos are in assets/videos/a.mp4, etc.
        source.src = `assets/videos/${currentLetter}.mp4`;
        document.title = `VIDEO ${currentLetter.toUpperCase()} | OBLIQUE ALPHABET`;
        video.load();

        // 3. Simple Randomizer Function
        function getRandom(type) {
            const alphabet = 'abcdefghijklmnopqrstuvwxyz'.split('');
            const randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];
            
            // Redirect to the same template but with a new random letter
            // If type is 'card', we can point to a card template later
            window.location.href = `template.html?letter=${randomLetter}`;
        }

        function replayVideo() {
            video.currentTime = 0;
            video.play();
        }
    </script>
</body>
</html>
