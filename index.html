<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET | HOME</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FONT SETUP */
        @font-face {
            font-family: 'LEIXO';
            src: url('fonts/LEIXO.ttf') format('truetype');
        }
        @font-face {
            font-family: 'NeueMachina-Bold';
            src: url('fonts/NeueMachina-Bold.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header {
            padding: 80px 20px 20px;
        }

        .logo {
            font-family: 'LEIXO', sans-serif;
            font-size: 54px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
        }

        .subtitle {
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* WIDER CONTAINER TO MATCH TITLE */
        .content-width {
            width: 100%;
            max-width: 600px; /* Increased to align with the logo width */
            padding: 0 20px;
        }

        /* TOP UTILITY ROW */
        .utility-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 40px auto 20px;
        }

        .utility-btn {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 15px 5px;
            font-family: 'NeueMachina-Bold', sans-serif; /* Switched to Machina Bold */
            font-size: 10px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .utility-btn:hover {
            background-color: white;
            color: black;
        }

        /* ALPHABET GRID */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px;
        }

        .letter-link {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background-color: white;
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-family: 'LEIXO', sans-serif; /* Letters stay LEIXO */
            transition: transform 0.1s ease;
        }

        .letter-link:hover {
            background-color: #eee;
            transform: scale(1.05);
        }

        .main-footer {
            margin-top: 60px;
            padding-bottom: 60px;
        }

        @media (max-width: 600px) {
            .logo { font-size: 38px; }
            .alphabet-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">OBLIQUE ALPHABET</h1>
        <p class="subtitle">an alphabet of control and resistance</p>
    </header>

    <div class="content-width">
        <nav class="utility-row">
            <a href="about.html" class="utility-btn">INTRODUCTION</a>
            <button class="utility-btn" onclick="getRandom('video')">PICK A RANDOM VIDEO</button>
            <button class="utility-btn" onclick="getRandom('card')">PICK A RANDOM CARD</button>
        </nav>

        <main class="grid-container">
            <nav id="alphabet-grid" class="alphabet-grid"></nav>
        </main>
    </div>

    <footer class="main-footer"></footer>

    <script src="script.js"></script>
    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const grid = document.getElementById('alphabet-grid');

        alphabet.forEach(letter => {
            const char = letter.toLowerCase();
            const link = document.createElement('a');
            link.href = `template.html?letter=${char}&mode=video`;
            link.className = 'letter-link';
            link.innerHTML = `<span>${letter}</span>`;
            grid.appendChild(link);
        });
    </script>
</body>
</html>
