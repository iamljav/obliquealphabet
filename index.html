<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET | HOME</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @font-face {
            font-family: 'LEIXO';
            src: url('fonts/LEIXO.ttf') format('truetype');
        }
        @font-face {
            font-family: 'NeueMachina-Bold';
            src: url('fonts/NeueMachina-Bold.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        /* MASTER ALIGNMENT CONTAINER */
        .main-header, .content-width {
            width: 100%;
            max-width: 600px; 
            padding: 0; /* Removed side padding to ensure edge-to-edge alignment */
            box-sizing: border-box;
        }

        .main-header {
            padding-top: 80px;
            padding-bottom: 20px;
            margin: 0 auto;
        }

        /* FLEX LOGO FOR PERFECT EDGE ALIGNMENT */
        .logo {
            font-family: 'LEIXO', sans-serif;
            font-size: clamp(24px, 8.5vw, 54px);
            text-transform: uppercase;
            margin: 0;
            display: flex;
            justify-content: space-between; /* This pushes letters to the absolute edges */
            width: 100%;
            white-space: nowrap;
        }

        /* Ensuring space between OBLIQUE and ALPHABET */
        .logo span.space {
            width: 0.3em; 
        }

        .subtitle {
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 25px;
            letter-spacing: 2px;
            display: block;
        }

        .content-width {
            margin: 0 auto;
        }

        .utility-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 40px 0 20px;
        }

        .utility-btn {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 15px 5px;
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px;
            width: 100%;
        }

        .letter-link {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background-color: white;
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-family: 'LEIXO', sans-serif;
        }

        .main-footer {
            margin-top: 60px;
            padding-bottom: 80px;
        }

        .about-link {
            font-family: 'NeueMachina-Bold', sans-serif;
            color: white;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 2px;
        }

        @media (max-width: 600px) {
            .main-header, .content-width { padding: 0 15px; }
            .alphabet-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">
            <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span>
            <span class="space"></span>
            <span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
        </h1>
        <p class="subtitle">an alphabet of control and creation</p>
    </header>

    <div class="content-width">
        <nav class="utility-row">
            <a href="template.html?letter=intro&mode=video" class="utility-btn">INTRODUCTION</a>
            <button class="utility-btn" onclick="getRandom('video')">PICK A RANDOM VIDEO</button>
            <button class="utility-btn" onclick="getRandom('card')">PICK A RANDOM CARD</button>
        </nav>

        <main class="grid-container">
            <nav id="alphabet-grid" class="alphabet-grid"></nav>
        </main>

        <footer class="main-footer">
            <a href="about.html" class="about-link">ABOUT THE ALPHABET</a>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const grid = document.getElementById('alphabet-grid');

        alphabet.forEach(letter => {
            const char = letter.toLowerCase();
            const link = document.createElement('a');
            link.href = `template.html?letter=${char}&mode=video`;
            link.className = 'letter-link';
            link.innerHTML = `<span>${letter}</span>`;
            grid.appendChild(link);
        });
    </script>
</body>
</html>
