<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET | HOME</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* FONT PATH CORRECTED FOR YOUR ASSETS FOLDER */
        @font-face {
            font-family: 'MSCHF';
            src: url('assets/fonts/MSCHF.otf') format('opentype');
        }

        body {
            background-color: #1a1a1a;
            font-family: 'MSCHF', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header {
            padding: 80px 20px 40px;
        }

        .logo {
            font-size: 54px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            font-family: 'MSCHF', sans-serif;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            margin-top: 15px;
            font-family: 'MSCHF', sans-serif;
        }

        .grid-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px;
        }

        .letter-link {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background-color: white;
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-family: 'MSCHF', sans-serif;
            transition: transform 0.1s ease;
        }

        .letter-link:hover {
            background-color: #eee;
            transform: scale(1.05);
        }

        .main-footer {
            margin-top: 60px;
            padding-bottom: 60px;
        }

        .about-link {
            color: white;
            text-decoration: underline;
            font-size: 14px;
            font-family: 'MSCHF', sans-serif;
        }

        @media (max-width: 450px) {
            .alphabet-grid { grid-template-columns: repeat(4, 1fr); }
            .logo { font-size: 38px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">OBLIQUE ALPHABET</h1>
        <p class="subtitle">an alphabet of control and creation</p>
    </header>

    <main class="grid-container">
        <nav id="alphabet-grid" class="alphabet-grid"></nav>
    </main>

    <footer class="main-footer">
        <a href="about.html" class="about-link">ABOUT THE PROJECT</a>
    </footer>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const grid = document.getElementById('alphabet-grid');

        alphabet.forEach(letter => {
            const char = letter.toLowerCase();
            const link = document.createElement('a');
            link.href = `template.html?letter=${char}&mode=video`;
            link.className = 'letter-link';
            link.innerHTML = `<span>${letter}</span>`;
            grid.appendChild(link);
        });
    </script>
</body>
</html>
