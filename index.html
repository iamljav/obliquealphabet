<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUEALPHABET</title>
    
    <link rel="icon" type="image/png" href="assets/favicon.png">

    <meta name="description" content="Inspired by Gilles Deleuze and Brian Eno, OBLIQUE ALPHABET is an AI generated alphabet of control and resistance designed to reclaim cultural agency.">
    
    <meta property="og:title" content="OBLIQUEALPHABET">
    <meta property="og:description" content="Inspired by Gilles Deleuze and Brian Eno, OBLIQUE ALPHABET is an AI generated alphabet of control and resistance designed to reclaim cultural agency.">
    <meta property="og:image" content="assets/favicon.png">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="OBLIQUEALPHABET">
    <meta name="twitter:description" content="Inspired by Gilles Deleuze and Brian Eno, OBLIQUE ALPHABET is an AI generated alphabet of control and resistance designed to reclaim cultural agency.">
    <meta name="twitter:image" content="assets/favicon.png">

    <link rel="stylesheet" href="style.css">
    <style>
        @font-face { font-family: 'LEIXO'; src: url('fonts/LEIXO.ttf') format('truetype'); }
        @font-face { font-family: 'NeueMachina-Bold'; src: url('fonts/NeueMachina-Bold.otf') format('opentype'); }

        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
        }

        .main-header, .content-width {
            width: 100%;
            max-width: 600px;
            padding: 0;
            box-sizing: border-box;
        }

        .main-header { padding-top: 20px; padding-bottom: 20px; }

        .logo { margin: 0; width: 100%; }
        .logo a {
            font-family: 'LEIXO', sans-serif;
            font-size: clamp(24px, 8.5vw, 54px);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            width: 100%;
            white-space: nowrap;
            color: inherit;
            text-decoration: none;
        }

        .subtitle {
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 25px;
            letter-spacing: 2px;
            white-space: nowrap;
            display: inline-block;
        }

        .utility-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 40px 0 20px;
        }

        .utility-btn {
            background-color: transparent;
            border: 1px solid white;
            color: white;
            padding: 15px 5px;
            font-family: 'NeueMachina-Bold', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .utility-btn:hover { background-color: white; color: black; }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 12px;
            width: 100%;
        }

        .letter-link {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background-color: white;
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-family: 'LEIXO', sans-serif;
        }

        .main-footer { margin-top: 60px; padding-bottom: 80px; }
        .about-link {
            font-family: 'NeueMachina-Bold', sans-serif;
            color: white;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 2px;
        }

        @media (max-width: 600px) {
            .main-header, .content-width { padding: 0 15px; }
            .main-header { padding-top: 20px; }
            .alphabet-grid { grid-template-columns: repeat(4, 1fr); }
            .utility-row { grid-template-columns: 1fr; }
            .subtitle { font-size: clamp(9px, 2.5vw, 12px); }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo">
            <a href="index.html">
                <span>O</span><span>B</span><span>L</span><span>I</span><span>Q</span><span>U</span><span>E</span><span>A</span><span>L</span><span>P</span><span>H</span><span>A</span><span>B</span><span>E</span><span>T</span>
            </a>
        </h1>
        <p class="subtitle">an alphabet of control and resistance</p>
    </header>

    <div class="content-width">
        <nav class="utility-row">
            <a href="template.html?letter=intro&mode=video" class="utility-btn">WATCH THE INTRODUCTION</a>
            <button class="utility-btn" onclick="window.location.href='template.html?letter=' + String.fromCharCode(97 + Math.floor(Math.random() * 26)) + '&mode=video'">PICK A RANDOM VIDEO</button>
            <button class="utility-btn" onclick="window.location.href='template.html?letter=' + String.fromCharCode(97 + Math.floor(Math.random() * 26)) + '&mode=card'">PICK A RANDOM CARD</button>
        </nav>

        <main id="alphabet-grid" class="alphabet-grid"></main>

        <footer class="main-footer">
            <a href="about.html" class="about-link">ABOUT THE ALPHABET</a>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            const grid = document.getElementById('alphabet-grid');
            if (grid) {
                grid.innerHTML = '';
                alphabet.forEach(letter => {
                    const char = letter.toLowerCase();
                    const link = document.createElement('a');
                    link.href = `template.html?letter=${char}&mode=video`;
                    link.className = 'letter-link';
                    link.innerHTML = `<span>${letter}</span>`;
                    grid.appendChild(link);
                });
            }
        });
    </script>
</body>
</html>
