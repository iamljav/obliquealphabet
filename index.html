<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET | HOME</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific Grid Styling for the Home Page */
        .grid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            padding: 20px;
        }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 columns across */
            gap: 12px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .letter-link {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            background-color: white;
            color: black;
            text-decoration: none;
            font-size: 24px;
            font-family: inherit; /* Uses your MSCHF font from style.css */
            transition: transform 0.1s ease;
        }

        .letter-link:hover {
            background-color: #f0f0f0;
            transform: scale(1.05);
        }

        @media (max-width: 400px) {
            .alphabet-grid {
                grid-template-columns: repeat(4, 1fr); /* 4 columns on small phones */
            }
        }
    </style>
</head>
<body class="home-page">

    <header class="main-header">
        <div class="title-block">
            <h1 class="logo">OBLIQUE ALPHABET</h1>
            <p class="subtitle">an alphabet of control and creation</p>
        </div>
    </header>

    <main class="grid-container">
        <nav id="alphabet-grid" class="alphabet-grid">
            </nav>
    </main>

    <footer class="main-footer" style="text-align: center; margin-top: 40px;">
        <a href="about.html" class="about-link">ABOUT THE PROJECT</a>
    </footer>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const grid = document.getElementById('alphabet-grid');

        alphabet.forEach(letter => {
            const char = letter.toLowerCase();
            const link = document.createElement('a');
            
            // Point to template with mode=video by default
            link.href = `template.html?letter=${char}&mode=video`;
            link.className = 'letter-link';
            link.innerHTML = `<span>${letter}</span>`;
            
            grid.appendChild(link);
        });
    </script>
</body>
</html>
