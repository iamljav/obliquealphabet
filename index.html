<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLIQUE ALPHABET | HOME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">

    <header class="main-header">
        <div class="title-block">
            <h1 class="logo">OBLIQUE ALPHABET</h1>
            <p class="subtitle">an alphabet of control and creation</p>
        </div>
    </header>

    <main class="grid-container">
        <nav id="alphabet-grid" class="alphabet-grid">
            </nav>
    </main>

    <footer class="main-footer">
        <a href="about.html">ABOUT THE PROJECT</a>
    </footer>

    <script>
        // 1. Define the alphabet
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const grid = document.getElementById('alphabet-grid');

        // 2. Loop through each letter and create a link
        alphabet.forEach(letter => {
            const char = letter.toLowerCase();
            const link = document.createElement('a');
            
            // This points to our single template with the specific letter and mode
            link.href = `template.html?letter=${char}&mode=video`;
            link.className = 'letter-link';
            link.innerHTML = `<span>${letter}</span>`;
            
            grid.appendChild(link);
        });
    </script>
</body>
</html>
